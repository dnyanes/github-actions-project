name: Java CI/CD Pipeline to Tomcat

on:
  push:
    branches: [ main ]   # Trigger on push to main branch

jobs:
  build:
    runs-on: [self-hosted, linux]

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Install Maven if missing
      - name: Ensure Maven is installed
        run: |
          if ! command -v mvn &> /dev/null; then
            echo "Maven not found. Installing..."
            sudo dnf install -y maven
          else
            echo "Maven is already installed"
          fi
          mvn -version
      # 4. Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 5. Build with Maven
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 6. Upload WAR as artifact (optional, for later jobs)
      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: myapp
          path: target/*.war
      # 6. Install SonarQube Scanner CLI
      - name: Install SonarQube Scanner CLI
        run: |
          if [ ! -d "$HOME/sonar-scanner-cli" ]; then
            echo "Downloading SonarQube Scanner CLI..."
            wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-7.3.0.5189-linux-x64.zip -O /tmp/sonar-scanner.zip
            unzip /tmp/sonar-scanner.zip -d $HOME
            mv $HOME/sonar-scanner-7.3.0.5189-linux-x64 $HOME/sonar-scanner-cli
          fi
          export PATH=$HOME/sonar-scanner-cli/bin:$PATH
          sonar-scanner -v
      # 7. SonarQube analysis
      - name: SonarQube Analysis
        env:
          SONAR_HOST: "http://13.201.6.31:9000"
          SONAR_LOGIN: "69c3b2730310258a8197d0697737f1b188d0220d"
        run: |
          echo "SonarQube server URL: $SONAR_HOST"
          curl -I $SONAR_HOST
          mvn sonar:sonar \
            -Dsonar.projectKey=hotstar \
            -Dsonar.host.url=$SONAR_HOST \
            -Dsonar.login=$SONAR_LOGIN
        # Step 5: Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1 # Change to your target AWS region

      # Step 6: Copy build artifacts to Amazon S3
      - name: Upload Artifacts to Amazon S3
        run: |
          aws s3 cp dist/app-build.zip s3://${{ secrets.AWS_S3_BUCKET }}/builds/${{ github.sha }}/app-build.zip
#Use code with caution.Key Workflow Updatesaws-actions/configure-aws-credentials: This is the official AWS action used to securely authenticate your workflow session using your GitHub environment secrets.aws s3 cp: Copies the artifact (dist/app-build.zip) directly to your specified bucket destination.${{ github.sha }}: Uses the unique Git commit ID in the S3 directory path to version-control your uploaded artifact objects and prevent files from over-writing each other.If you'd like, let me know:Do you prefer using IAM Roles with OIDC provider authentication instead of long-lived access keys for better security?Do you need to apply specific S3 Access Control Lists (ACLs) or storage classes (like Glacier) on upload?AI can make mistakes, so double-check responses 16 sitesHow to authenticate to an AWS S3 bucket25 Apr 2023 — How to authenticate to an AWS S3 bucket 2. Upload your images on your bucket 3. Retrieve your access key On AWS console, go to sec...TwicPicsUpload Artifacts to S39 Oct 2025 — Upload Artifacts to S3 ( AWS S3 ) Access to an S3 ( AWS S3 ) instance. A CI pipeline with a Build stage. Steps in your pipeline th...Harness Developer Hub

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      # 7. Download WAR artifact
      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: myapp

      # 8. Deploy WAR via Tomcat Manager
      - name: Deploy to Tomcat
        run: |
          WAR_FILE=$(ls *.war)
          echo "Deploying $WAR_FILE to Tomcat..."
          curl -v --upload-file "$WAR_FILE" \
            "http://${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }}@${{ secrets.TOMCAT_HOST }}/manager/text/deploy?path=/myapp&update=true"
      # 9. Optional: verify deployment
      - name: Verify deployment
        run: |
          curl -I http://${{ secrets.TOMCAT_HOST }}/myapp
